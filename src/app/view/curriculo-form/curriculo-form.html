<section class="curriculo-form-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Candidato simulado #1</p>
      <h1>{{ modoEdicao ? 'Editar curriculo' : 'Novo curriculo' }}</h1>
    </div>

    <a routerLink="/meu-curriculo" class="link-button">Meu curriculo</a>
  </header>

  @if (feedbackTexto) {
    <p class="feedback" [class.erro]="feedbackTipo === 'erro'">{{ feedbackTexto }}</p>
  }

  @if (carregando) {
    <p class="status">Carregando curriculo...</p>
  } @else {
    <form [formGroup]="curriculoForm" (ngSubmit)="salvarCurriculo()" novalidate>
      <div class="form-grid">
        <label>
          Usuario ID
          <input type="number" formControlName="usuarioId" readonly>
        </label>

        <label>
          Vaga vinculada
          <input type="text" formControlName="vagaId" placeholder="Ex: 1">
        </label>
      </div>

      <label>
        Titulo profissional
        <input type="text" formControlName="titulo" placeholder="Ex: Desenvolvedor Front-end">
        @if (campoInvalido('titulo')) {
          <small>Informe um titulo com pelo menos 3 caracteres.</small>
        }
      </label>

      <label>
        Formacao
        <textarea formControlName="formacao" rows="3" placeholder="Curso, instituicao e nivel de formacao"></textarea>
        @if (campoInvalido('formacao')) {
          <small>Informe sua formacao com pelo menos 5 caracteres.</small>
        }
      </label>

      <label>
        Experiencia
        <textarea formControlName="experiencia" rows="4" placeholder="Experiencias profissionais principais"></textarea>
        @if (campoInvalido('experiencia')) {
          <small>Informe sua experiencia com pelo menos 5 caracteres.</small>
        }
      </label>

      <label>
        Habilidades
        <textarea formControlName="habilidades" rows="3" placeholder="Angular, TypeScript, atendimento, gestao..."></textarea>
        @if (campoInvalido('habilidades')) {
          <small>Informe suas habilidades principais.</small>
        }
      </label>

      <label>
        LinkedIn
        <input type="text" formControlName="linkedin" placeholder="https://www.linkedin.com/in/seu-perfil">
        @if (campoInvalido('linkedin')) {
          <small>Use um endereco do LinkedIn valido.</small>
        }
      </label>

      <label>
        Resumo profissional
        <textarea formControlName="resumo" rows="4" placeholder="Resumo curto sobre seu perfil profissional"></textarea>
        @if (campoInvalido('resumo')) {
          <small>Informe um resumo com pelo menos 10 caracteres.</small>
        }
      </label>

      <div class="actions">
        <button type="submit" [disabled]="salvando">
          {{ salvando ? 'Salvando...' : 'Salvar curriculo' }}
        </button>
        <a routerLink="/curriculos" class="secondary-action">Ver curriculos</a>
      </div>
    </form>
  }
</section>
